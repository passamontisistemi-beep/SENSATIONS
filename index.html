<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sensations Presentation</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:Arial, Helvetica, sans-serif;
}

.slider{
  width:100vw;
  height:100vh;
  position:relative;
}

.slide{
  position:absolute;
  inset:0;
  opacity:0;
  transition:opacity 1s ease-in-out;
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
}

.slide.active{
  opacity:1;
  z-index:2;
}

.caption{
  position:absolute;
  left:50%;
  bottom:40px;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.55);
  color:#fff;
  padding:14px 28px;
  border-radius:10px;
  font-size:2vw;
  letter-spacing:1px;
  text-transform:uppercase;
}

.brand{
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:3vw;
  background:#111;
}
</style>
</head>

<body>

<div class="slider">

  <!-- Slide 1 -->
  <div class="slide active" style="background-image:url('images/slide1.jpg');">
    <div class="caption">Totem ingresso</div>
  </div>

  <!-- Slide 2 -->
  <div class="slide" style="background-image:url('images/slide2.jpg');">
    <div class="caption">Ingresso</div>
  </div>

  <!-- Slide 3 -->
  <div class="slide" style="background-image:url('images/slide3.jpg');">
    <div class="caption">Ingresso</div>
  </div>

  <!-- Slide 4 -->
  <div class="slide" style="background-image:url('images/slide4.jpg');">
    <div class="caption">Recinzione</div>
  </div>

  <!-- Slide 5 -->
  <div class="slide" style="background-image:url('images/slide5.jpg');">
    <div class="caption">Aree verdi • Ginkgo Biloba • Agave</div>
  </div>

  <!-- Slide 6 -->
  <div class="slide" style="background-image:url('images/slide6.jpg');">
    <div class="caption">Vetrate</div>
  </div>

  <!-- Slide 7 -->
  <div class="slide" style="background-image:url('images/slide7.jpg');">
    <div class="caption">Tende Lunaria</div>
  </div>

  <!-- Slide Finale -->
  <div class="slide brand">
    Powered by PASSAMONTI_COMMUNICATION
  </div>

</div>

<script>
const slides = document.querySelectorAll('.slide');
let current = 0;

setInterval(() => {
  slides[current].classList.remove('active');
  current = (current + 1) % slides.length;
  slides[current].classList.add('active');
}, 4000);
</script>

</body>
</html>
